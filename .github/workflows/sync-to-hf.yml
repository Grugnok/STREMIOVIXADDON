name: Sync to Hugging Face Hub

on:
  push:
    branches: [main] # Sincronizza quando fai push sul branch 'main'

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.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 }}
        run: git push https://Grugnok:$HF_TOKEN@huggingface.co/spaces/Grugnok/STREMIOVIXADDON main
